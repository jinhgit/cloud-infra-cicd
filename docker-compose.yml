# 로컬 통합 실행 (과금 없음)
#   ./scripts/dev-free.sh
#   또는 docker compose up --build

services:
  be:
    build:
      context: ./BE
      dockerfile: Dockerfile
      args:
        TARGETPLATFORM: ${DOCKER_PLATFORM:-linux/amd64}
        GIT_SHA: ${GIT_SHA:-dev}
        APP_VERSION: ${APP_VERSION:-0.1.0}
    image: cloud-infra-be:local
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    container_name: cloud-infra-be
    environment:
      PORT: "3000"
      NODE_ENV: production
      SERVICE_NAME: cloud-infra-be
      GIT_SHA: ${GIT_SHA:-dev}
      APP_VERSION: ${APP_VERSION:-0.1.0}
    ports:
      - "3000:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 8s
    restart: unless-stopped

  fe:
    build:
      context: ./FE
      dockerfile: Dockerfile
      args:
        TARGETPLATFORM: ${DOCKER_PLATFORM:-linux/amd64}
    image: cloud-infra-fe:local
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    container_name: cloud-infra-fe
    ports:
      - "8080:80"
    depends_on:
      be:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
