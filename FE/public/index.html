<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cloud Infra — Demo</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <main class="container">
      <h1>Cloud Infra Demo</h1>
      <p class="subtitle">IaC · 3-Tier Network · EKS · CI/CD</p>
      <p id="runtime-meta" class="meta"></p>

      <section class="card">
        <div class="card-head">
          <h2>GET /health</h2>
          <button type="button" id="btn-refresh" class="btn">새로고침</button>
        </div>
        <p id="health-status" class="status pending">checking…</p>
        <pre id="health-body" class="code"></pre>
      </section>

      <section class="card">
        <h2>GET /api/hello</h2>
        <p id="hello-status" class="status pending">checking…</p>
        <pre id="hello-body" class="code"></pre>
      </section>

      <footer>
        <small>
          FE (Nginx) · same-origin API · Docker Compose / EKS Ingress 대응
        </small>
      </footer>
    </main>
    <script src="/js/config.js"></script>
    <script src="/js/app.js"></script>
  </body>
</html>
