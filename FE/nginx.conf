server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: reverse-proxy to BE Service when co-located behind same Ingress path
    # location /api/ {
    #     proxy_pass http://be-service:3000/;
    # }

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok\n';
    }
}
