server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 정적 FE
    location / {
        try_files $uri $uri/ /index.html;
    }

    # FE 컨테이너 자체 헬스 (K8s probe / Docker HEALTHCHECK)
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 'ok\n';
    }

    # --------------------------------------------------
    # Docker Compose 연동: same-origin 으로 BE 프록시
    # (EKS Ingress 에서는 ALB 가 /api·/health 를 BE 로 보내므로
    #  브라우저 요청이 FE Pod 로 오지 않음 — 이 블록은 무해)
    # 서비스 이름: docker-compose 의 be
    # --------------------------------------------------
    location /api/ {
        proxy_pass http://be:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass http://be:3000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
