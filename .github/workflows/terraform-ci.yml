# Terraform CI — fmt/validate + plan (자격 있을 때) + PR 코멘트
name: Terraform CI

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-ci.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  # OIDC 사용 시 아래 주석 해제 + docs/CI.md OIDC 설정
  # id-token: write

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  AWS_REGION: ap-northeast-2
  TF_VAR_my_ip: "203.0.113.10/32"
  TF_VAR_acknowledge_paid_aws: "false"
  TF_VAR_confirm_paid_apply: ""
  TF_VAR_nat_gateway_count: "0"
  TF_VAR_enable_eks: "false"
  TF_VAR_enable_bastion: "false"
  TF_VAR_enable_ecr: "false"
  TF_VAR_environment: "dev"
  TF_VAR_project_name: "cloud-infra"

jobs:
  check:
    name: fmt & validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"
          terraform_wrapper: false
      - run: terraform fmt -check -recursive -diff
      - run: terraform init -backend=false
      - run: terraform validate -no-color

  plan:
    name: terraform plan
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: terraform
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"
          terraform_wrapper: false

      - name: Detect AWS credentials (static key or OIDC role)
        id: aws
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
        run: |
          if [ -n "${AWS_ROLE_ARN}" ]; then
            echo "mode=oidc" >> "$GITHUB_OUTPUT"
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "OIDC role 사용"
          elif [ -n "${AWS_ACCESS_KEY_ID}" ]; then
            echo "mode=keys" >> "$GITHUB_OUTPUT"
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "Access Key 사용 (OIDC 권장 — docs/CI.md)"
          else
            echo "mode=none" >> "$GITHUB_OUTPUT"
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::AWS 자격 없음 — plan 스킵"
          fi

      # OIDC (권장): Secrets.AWS_ROLE_ARN + permissions id-token: write
      - name: Configure AWS (OIDC)
        if: steps.aws.outputs.mode == 'oidc'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure AWS (access keys)
        if: steps.aws.outputs.mode == 'keys'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: terraform init
        if: steps.aws.outputs.configured == 'true'
        run: terraform init -backend=false

      - name: terraform plan
        id: plan
        if: steps.aws.outputs.configured == 'true'
        run: |
          set -o pipefail
          terraform plan -no-color -input=false \
            -var="my_ip=${TF_VAR_my_ip}" \
            -var="acknowledge_paid_aws=false" \
            -var="confirm_paid_apply=" \
            -var="nat_gateway_count=0" \
            -var="enable_eks=false" \
            -var="enable_bastion=false" \
            -var="enable_ecr=false" \
            -out=tfplan 2>&1 | tee plan.txt
          echo "plan_exit=0" >> "$GITHUB_OUTPUT"

      - name: Upload plan artifact
        if: steps.aws.outputs.configured == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.sha }}
          path: |
            terraform/tfplan
            terraform/plan.txt
          retention-days: 7

      - name: PR comment (plan summary)
        if: >
          steps.aws.outputs.configured == 'true' &&
          github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## Terraform plan (free mode)\n\n`acknowledge_paid_aws=false` — 유료 리소스 없음\n\n';
            try {
              const txt = fs.readFileSync('terraform/plan.txt', 'utf8');
              const lines = txt.trim().split('\n');
              const tail = lines.slice(-40).join('\n');
              body += '```text\n' + tail + '\n```\n';
            } catch (e) {
              body += '_plan.txt 없음_\n';
            }
            body += '\n_CI apply 없음. 유료 배포는 사용자 확인 후 로컬 스크립트만._';
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Skip notice
        if: steps.aws.outputs.configured != 'true'
        run: echo "plan skipped"
